<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Fylo data storage component</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="img-container">
          <img src="./images/logo.svg" alt="logo icon" />
        </div>
        <div class="folders">
          <div class="box">
            <img src="./images/icon-document.svg" alt="document icon" />
          </div>
          <div class="box">
            <img src="./images/icon-folder.svg" alt="folder icon" />
          </div>
          <div class="box">
            <img src="./images/icon-upload.svg" alt="upload icon" />
          </div>
        </div>
      </header>

      <main class="main">
        <h1>You &apos;ve used <strong>815 GB</strong> of your storage</h1>
        <div class="progress-bar">
          <div class="bar">
            <div class="ball"></div>
          </div>
        </div>
        <div class="text"><span>0 GB</span><span>1000 GB</span></div>
        <div class="tooltip">
          <h2>185 <span>GB Left</span></h2>
        </div>
      </main>
    </div>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/fylo-data-storage-component-1dZPRbV5n"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/verakissyou17">Vera</a>.
    </footer>
  </body>
</html>
